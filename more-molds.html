<body>
<header class="header">
  <div class="logo">打火机</div>
  <button class="back" onclick="window.location.href='index.html#molds'">返回模具系统</button>
</header>

<main class="page">
  <div class="section-title">
    <h1>打火机散件<span>模具</span></h1>
  </div>
  <div class="filter">
    <div class="filter-line"><div class="filter-row" id="mainFilter"></div></div>
  </div>
  <div class="grid" id="moldGrid"></div>
</main>
<div class="image-viewer" id="imageViewer" aria-hidden="true">
  <div class="viewer-stage" id="viewerStage">
    <img class="viewer-image" id="viewerImage" alt="">
  </div>
</div>

<script>
(() => {
  const ASSET_VERSION = 'placeholder-20260614-0952';
  let activeCategory = 'electronic';
  const catalog = {
    electronic: { label: '电子打火机', count: 8, folder: '电子打火机', files: ['1 (1).png', '1 (2).png', '1 (4).jpg', '1 (5).jpg', '1 (6).jpg'] },
    flint: { label: '砂轮打火机', count: 10, folder: '砂轮打火机', files: ['01.jpg'] },
    windproof: { label: '防风打火机', count: 9, folder: '防风打火机', files: ['1 (1).jpg', '1 (2).jpg', '1 (3).jpg', '1 (3).png', '1 (4).png'] },
    lamp: { label: '灯机', count: 3, folder: '灯机', files: ['01.jpg'] }
  };

  function getImageTitle(file){
    return file.replace(/\.[^.]+$/, '');
  }

  function escapeHtml(text){
    return text.replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));
  }

  const filter = document.getElementById('mainFilter');
  const grid = document.getElementById('moldGrid');
  const viewer = document.getElementById('imageViewer');
  const viewerStage = document.getElementById('viewerStage');
  const viewerImage = document.getElementById('viewerImage');
  const keys = Object.keys(catalog);
  const activePointers = new Map();
  let viewerScale = 1;
  let panX = 0;
  let panY = 0;
  let startDistance = 0;
  let startScale = 1;
  let lastPoint = null;
  let pointerMoved = false;
  let suppressCloseUntil = 0;

  function renderFilter(){
    filter.innerHTML = keys.map(key => {
      const item = catalog[key];
      return `<button class="filter-btn${key === activeCategory ? ' active' : ''}" type="button" data-category="${key}">${escapeHtml(item.label)}<span class="count">(${item.count})</span></button>`;
    }).join('');
  }

  function clampScale(value){
    return Math.max(1, Math.min(4, value));
  }

  function updateViewerTransform(){
    if(viewerScale <= 1.01){
      viewerScale = 1;
      panX = 0;
      panY = 0;
    }
    viewerImage.style.transform = `translate(${panX}px, ${panY}px) scale(${viewerScale})`;
    viewerImage.classList.toggle('zoomed', viewerScale > 1);
  }

  function openViewer(src, alt){
    viewerImage.src = src;
    viewerImage.alt = alt || '';
    viewerScale = 1;
    panX = 0;
    panY = 0;
    activePointers.clear();
    lastPoint = null;
    updateViewerTransform();
    viewer.classList.add('active');
    viewer.setAttribute('aria-hidden', 'false');
    document.body.classList.add('viewer-open');
  }

  function closeViewer(){
    viewer.classList.remove('active');
    viewer.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('viewer-open');
    viewerImage.removeAttribute('src');
  }

  function getDistance(points){
    const first = points[0];
    const second = points[1];
    return Math.hypot(first.x - second.x, first.y - second.y);
  }

  function endPointer(event){
    if(!activePointers.has(event.pointerId)) return;
    activePointers.delete(event.pointerId);
    viewerStage.classList.remove('dragging');
    if(pointerMoved) suppressCloseUntil = Date.now() + 260;
    if(activePointers.size === 1){
      const point = Array.from(activePointers.values())[0];
      lastPoint = {x:point.x, y:point.y};
    } else {
      lastPoint = null;
    }
  }

  function updateActiveButton(){
    filter.querySelectorAll('[data-category]').forEach(button => {
      button.classList.toggle('active', button.dataset.category === activeCategory);
    });
  }

  function renderGrid(){
    const current = catalog[activeCategory] || catalog[keys[0]];
    const files = current.files;
    grid.innerHTML = files.map(file => {
      const title = escapeHtml(getImageTitle(file));
      const src = escapeHtml(`images/03-模具系统-临时打火机占位/${current.folder}/${file}?v=${ASSET_VERSION}`);
      return `<article class="card"><img src="${src}" alt="${title}" loading="lazy" decoding="async"><h2>${title}</h2></article>`;
    }).join('');
  }

  grid.addEventListener('click', event => {
    const image = event.target.closest('.card img');
    if(!image) return;
    openViewer(image.currentSrc || image.src, image.alt);
  });

  viewer.addEventListener('click', () => {
    if(Date.now() < suppressCloseUntil) return;
    closeViewer();
  });

  viewerStage.addEventListener('wheel', event => {
    event.preventDefault();
    const zoomFactor = event.deltaY < 0 ? 1.14 : 0.88;
    viewerScale = clampScale(viewerScale * zoomFactor);
    updateViewerTransform();
  }, {passive:false});

  viewerStage.addEventListener('pointerdown', event => {
    event.preventDefault();
    viewerStage.setPointerCapture(event.pointerId);
    activePointers.set(event.pointerId, {x:event.clientX, y:event.clientY});
    pointerMoved = false;
    if(activePointers.size === 1){
      lastPoint = {x:event.clientX, y:event.clientY};
    }
    if(activePointers.size === 2){
      const points = Array.from(activePointers.values());
      startDistance = getDistance(points);
      startScale = viewerScale;
    }
  });

  viewerStage.addEventListener('pointermove', event => {
    if(!activePointers.has(event.pointerId)) return;
    const previous = activePointers.get(event.pointerId);
    const next = {x:event.clientX, y:event.clientY};
    activePointers.set(event.pointerId, next);
    if(Math.hypot(next.x - previous.x, next.y - previous.y) > 3) pointerMoved = true;
    if(activePointers.size === 2){
      const points = Array.from(activePointers.values());
      const distance = getDistance(points);
      if(startDistance > 0){
        viewerScale = clampScale(startScale * (distance / startDistance));
        updateViewerTransform();
      }
      suppressCloseUntil = Date.now() + 260;
      return;
    }
    if(viewerScale > 1 && lastPoint){
      panX += next.x - lastPoint.x;
      panY += next.y - lastPoint.y;
      lastPoint = next;
      viewerStage.classList.add('dragging');
      updateViewerTransform();
      suppressCloseUntil = Date.now() + 260;
    }
  });

  viewerStage.addEventListener('pointerup', endPointer);
  viewerStage.addEventListener('pointercancel', endPointer);

  document.addEventListener('keydown', event => {
    if(event.key === 'Escape' && viewer.classList.contains('active')) closeViewer();
  });

  filter.addEventListener('click', event => {
    const button = event.target.closest('[data-category]');
    if(!button || !catalog[button.dataset.category]) return;
    activeCategory = button.dataset.category;
    updateActiveButton();
    renderGrid();
  });

  renderFilter();
  renderGrid();
})();
</script>
