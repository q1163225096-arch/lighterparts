<script>
const imageVersion = '20260615-user-0904';
const detailImageRoot = 'images/01-部件拆解/更多拆解图-替换区';
const categories = [
  {key:'electronic', label:'电子打火机', files:['电子机组成.png']},
  {key:'flint', label:'砂轮打火机', files:['砂轮机组成.png']},
  {key:'windproof', label:'防风打火机', files:['防风打火机.jpg']},
  {key:'flintHead', label:'砂轮成品头', files:['砂轮成品头拆解图.png']},
  {key:'lamp', label:'灯机', files:['灯机.png']}
];
let currentCategory = categories[0].key;
let zoomLevel = 1;

function localized(text) {
  return window.translatePageText ? translatePageText(text) : text;
}

function clampZoom(value) {
  return Math.max(0.5, Math.min(2.5, value));
}

function updateZoomControls() {
  const holder = document.querySelector('.detail-image');
  const image = document.querySelector('.detail-image img');
  if (holder) holder.classList.toggle('zoomed', zoomLevel > 1);
  if (image) image.style.width = `${zoomLevel * 100}%`;
}

function setZoom(value) {
  zoomLevel = clampZoom(value);
  updateZoomControls();
}

function toggleImageZoom() {
  const nextZoom = zoomLevel === 1 ? 2 : 1;
  setZoom(nextZoom);
  const holder = document.querySelector('.detail-image');
  if (holder && nextZoom === 1) {
    holder.scrollLeft = 0;
    holder.scrollTop = 0;
  }
}

function switchCategory(key) {
  currentCategory = key;
  zoomLevel = 1;
  renderPage();
}

function getActiveCategory() {
  return categories.find(category => category.key === currentCategory) || categories[0];
}

function renderCategoryFilter() {
  document.getElementById('categoryFilter').innerHTML = categories.map(category => `
    <button class="category-btn${category.key === currentCategory ? ' active' : ''}" onclick="switchCategory('${category.key}')">
      ${localized(category.label)}
    </button>
  `).join('');
}

function renderDetails() {
  const category = getActiveCategory();
  const file = category.files[0];
  const src = `${detailImageRoot}/${category.label}/${file}?v=${imageVersion}`;
  const label = localized(category.label);
  const suffix = window.pageT ? pageT('exploded_alt_suffix') : '拆解详情图';
  document.getElementById('detailsList').innerHTML = `
    <figure class="detail-image" onclick="toggleImageZoom()">
      <img src="${src}" alt="${label}${suffix}" loading="eager" decoding="async" onload="updateZoomControls()" onerror="this.parentElement.classList.add('image-missing')">
    </figure>
  `;
  updateZoomControls();
}

function renderPage() {
  renderCategoryFilter();
  renderDetails();
}

if(window.initPageI18n) initPageI18n(() => renderPage());
renderPage();
</script>
