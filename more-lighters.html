    transform:translateX(50%);
  }
  .image-viewer__tools button{
    width:36px;
    height:36px;
  }
}
</style>
<link rel="stylesheet" href="page-i18n.css">
</head>
<body>
<header class="header">
  <a class="logo" href="index.html" data-i18n="brand">打火机散件及自动化设备</a>
  <button class="back" data-i18n="back_materials" onclick="window.location.href='index.html#materials'">返回原材料供应</button>
</header>

<main class="page">
  <div class="section-title">
    <h1><span data-i18n="more_lighters_title_main">更多</span> <span data-i18n="more_lighters_title_accent">打火机</span></h1>
    <p data-i18n="more_lighters_subtitle">按工厂和产品栏目筛选打火机款式图</p>
    <form class="page-search" id="pageSearch" role="search" autocomplete="off">
      <div class="search-field" data-i18n-aria="search_aria" aria-label="搜索打火机名称或型号">
        <button class="search-toggle" id="searchToggle" type="button" data-i18n-aria="search_open" data-i18n-title="search_title" aria-label="打开搜索" title="搜索">⌕</button>
        <input class="search-input" id="productSearch" type="search" data-i18n-placeholder="search_placeholder" placeholder="搜索名称 / 型号">
        <button class="search-clear" id="searchClear" type="button" data-i18n-aria="search_clear" data-i18n-title="search_clear" aria-label="清空搜索" title="清空">×</button>
      </div>
    </form>
  </div>
  <div class="more-filter">
    <div class="filter-line factory-line">
      <span class="filter-label"></span>
      <div class="filter-row" id="mainFilter"></div>
    </div>
    <div class="filter-line category-line">
      <span class="filter-label"></span>
      <div class="filter-row" id="subFilter"></div>
    </div>
  </div>
  <noscript>
    <section aria-label="更多打火机款式摘要">
      <h2>更多打火机款式分类</h2>
      <p>按工厂和产品目录查看电子打火机、砂轮打火机、防风打火机、点火枪、点烟器和其他定制打火机款式。</p>
      <p><a href="index.html#materials">返回原材料供应</a> · <a href="more-molds.html">查看打火机散件模具</a> · <a href="production-details.html">查看生产工艺细节</a></p>
    </section>
  </noscript>
  <div class="grid" id="productGrid"></div>
  <div class="pager" id="productPager"></div>
</main>
<div class="image-viewer" id="imageViewer" aria-hidden="true">
  <div class="image-viewer__surface" id="imageViewerSurface">
    <img class="image-viewer__image" id="imageViewerImage" alt="">
  </div>
  <div class="image-viewer__tools" data-i18n-aria="image_zoom_tools" aria-label="图片缩放">
    <button type="button" data-viewer-action="zoom-out" data-i18n-aria="zoom_out" data-i18n-title="zoom_out" aria-label="缩小" title="缩小">−</button>
    <button type="button" data-viewer-action="reset" data-i18n-aria="zoom_reset" data-i18n-title="zoom_reset" aria-label="还原" title="还原">1×</button>
    <button type="button" data-viewer-action="zoom-in" data-i18n-aria="zoom_in" data-i18n-title="zoom_in" aria-label="放大" title="放大">＋</button>
  </div>
</div>

<script src="page-i18n.js"></script>
<script src="factory1-catalog.js"></script>
<script src="factory2-catalog.js"></script>
<script>
let currentCategory='catalog';
let currentFactory='factory1';
let currentPage=1;
let searchQuery='';
const itemsPerPage=9;
const factories=[
  {key:'factory1',label:'工厂一'},
  {key:'factory2',label:'工厂二'},
  {key:'factory3',label:'工厂三'},
  {key:'factory4',label:'工厂四'},
  {key:'factory5',label:'工厂五'}
];
const factory1CategoryOrder=[
  {key:'electronic',label:'电子打火机'},
  {key:'windproof',label:'防风打火机'},
  {key:'flint',label:'砂轮打火机'},
  {key:'torch',label:'点火枪'},
  {key:'cigarette',label:'点烟器'},
  {key:'other',label:'其他产品'}
];
const factory1Items=normalizeCatalog(window.factory1Catalog || []);
const categories=buildCategorySet(factory1Items, factory1CategoryOrder);
if(factory1Items.length){
  categories.catalog={label:'产品中心',items:factory1Items,hidden:true};
}
function normalizeCatalog(catalog){
  return (catalog || []).map(item=>({
    title:item.title,
    model:item.model,
    img:item.img,
    href:item.href,
    category:item.category || 'catalog'
  }));
}
function escapeHtml(text){
  return String(text || '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}
function displayTitle(title){
  return (title || '').replace(/^DY-/,'');
}
function imageSrc(src){
  if(/^https?:\/\//i.test(src || '')) return src;
  return `${src}?v=clean-20260614`;
}
function buildCategorySet(catalog, categoryOrder){
  const set={};
  (categoryOrder || []).forEach(category=>{
    if(!category || !category.key) return;
    set[category.key]={label:category.label || category.key,items:[]};
  });
  (catalog || []).forEach(item=>{
    const key=item.category || 'other';
    if(!set[key]) set[key]={label:key,items:[]};
    set[key].items.push(item);
  });
  return set;
}
const factoryCategoryMap={
  factory1:categories,
  factory2:buildCategorySet(window.factory2Catalog || [], window.factory2CategoryOrder || [])
};
const mainFilter=document.getElementById('mainFilter');
const subFilter=document.getElementById('subFilter');
const productGrid=document.getElementById('productGrid');
const productPager=document.getElementById('productPager');
const pageSearch=document.getElementById('pageSearch');
const searchToggle=document.getElementById('searchToggle');
const productSearch=document.getElementById('productSearch');
const searchClear=document.getElementById('searchClear');
const imageViewer=document.getElementById('imageViewer');
const imageViewerSurface=document.getElementById('imageViewerSurface');
const imageViewerImage=document.getElementById('imageViewerImage');
const viewerPointers=new Map();
let viewerScale=1;
let viewerX=0;
let viewerY=0;
let viewerDrag=null;
let viewerPinch=null;
let viewerMoved=false;
let suppressViewerClick=false;
function getFactoryCategories(factoryKey){
  return factoryCategoryMap[factoryKey] || {};
}
function getVisibleCategoryKeys(categorySet){
  return Object.keys(categorySet).filter(key=>!categorySet[key].hidden);
}
function getDefaultCategory(factoryKey){
  const categorySet=getFactoryCategories(factoryKey);
  const keys=getVisibleCategoryKeys(categorySet);
  return factoryKey==='factory1' && categorySet.catalog ? 'catalog' : (keys[0] || 'catalog');
}
function normalizeSearchText(text){
  return String(text || '').trim().toLowerCase();
}
function getFactoryLabel(factoryKey){
  const label=(factories.find(factory=>factory.key===factoryKey) || {}).label || factoryKey;
  return window.translatePageText ? translatePageText(label) : label;
}
function getSearchItems(){
  const results=[];
  Object.entries(factoryCategoryMap).forEach(([factoryKey,categorySet])=>{
    const factoryLabel=getFactoryLabel(factoryKey);
    const sourceKeys=categorySet.catalog ? ['catalog'] : getVisibleCategoryKeys(categorySet);
    sourceKeys.forEach(categoryKey=>{
      const category=categorySet[categoryKey];
      if(!category) return;
      (category.items || []).forEach(item=>{
        results.push({
          ...item,
          _factoryLabel:factoryLabel,
          _categoryLabel:window.translatePageText ? translatePageText(category.label || categoryKey) : (category.label || categoryKey)
        });
      });
    });
  });
  return results;
}
function getFilteredItems(baseItems){
  const query=normalizeSearchText(searchQuery);
  if(!query) return baseItems;
  return getSearchItems().filter(item=>{
    const text=[
      item.model,
      item.title,
      displayTitle(item.model || item.title),
      item._factoryLabel,
      item._categoryLabel
    ].join(' ');
    return normalizeSearchText(text).includes(query);
  });
}
function syncSearchState(){
  const hasValue=Boolean(searchQuery.trim());
  pageSearch.classList.toggle('is-open',hasValue || document.activeElement===productSearch);
  pageSearch.classList.toggle('has-value',hasValue);
}
function selectFactory(key){
  currentFactory=key;
  currentCategory=getDefaultCategory(currentFactory);
  currentPage=1;
  render();
}
function selectCategory(key){
  currentCategory=key;
  currentPage=1;
  render();
}
function selectPage(page){
  currentPage=page;
  render();
  document.getElementById('productGrid').scrollIntoView({block:'start',behavior:'smooth'});
}
function clampViewerScale(value){
  return Math.min(Math.max(value,1),4);
}
function applyViewerTransform(){
  if(viewerScale<=1.01){
    viewerScale=1;
    viewerX=0;
    viewerY=0;
  }
  imageViewerImage.style.transform=`translate3d(${viewerX}px,${viewerY}px,0) scale(${viewerScale})`;
  imageViewerImage.classList.toggle('is-zoomed',viewerScale>1);
}
function setViewerScale(nextScale){
  viewerScale=clampViewerScale(nextScale);
  applyViewerTransform();
}
function openImageViewer(img){
  imageViewerImage.src=img.currentSrc || img.src;
  imageViewerImage.alt=img.alt || '';
  viewerScale=1;
  viewerX=0;
  viewerY=0;
  viewerPointers.clear();
  applyViewerTransform();
  imageViewer.classList.add('is-open');
  imageViewer.setAttribute('aria-hidden','false');
  document.body.classList.add('image-viewer-open');
}
function closeImageViewer(){
  imageViewer.classList.remove('is-open');
  imageViewer.setAttribute('aria-hidden','true');
  document.body.classList.remove('image-viewer-open');
  imageViewerImage.removeAttribute('src');
  viewerPointers.clear();
}
function getPointerDistance(points){
  const [a,b]=points;
  return Math.hypot(a.x-b.x,a.y-b.y);
}
function restartSinglePointerDrag(){
  const [point]=viewerPointers.values();
  viewerDrag=point ? {x:point.x,y:point.y,startX:viewerX,startY:viewerY} : null;
  viewerPinch=null;
}
function getVisiblePages(totalPages){
  const range=new Set([1,totalPages,currentPage,currentPage-1,currentPage+1]);
  if(currentPage<=3){
    range.add(2);
    range.add(3);
  }
  if(currentPage>=totalPages-2){
    range.add(totalPages-1);
    range.add(totalPages-2);
  }
  const pages=[...range].filter(page=>page>=1&&page<=totalPages).sort((a,b)=>a-b);
  return pages.reduce((list,page,index)=>{
    if(index&&page-pages[index-1]>1) list.push('...');
    list.push(page);
    return list;
  },[]);
}
function renderPager(totalItems){
  const pager=document.getElementById('productPager');
  const totalPages=Math.ceil(totalItems/itemsPerPage);
  if(totalPages<=1){
    pager.innerHTML='';
    return;
  }
  currentPage=Math.min(Math.max(1,currentPage),totalPages);
  const pageButtons=getVisiblePages(totalPages).map(page=>{
    if(page==='...') return `<span class="pager-ellipsis">...</span>`;
    return `<button class="pager-btn${page===currentPage?' active':''}" type="button" data-page="${page}">${page}</button>`;
  }).join('');
  pager.innerHTML=`
    <button class="pager-btn" type="button" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">${escapeHtml(window.pageT ? pageT('prev_page') : '上一页')}</button>
    ${pageButtons}
    <button class="pager-btn" type="button" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">${escapeHtml(window.pageT ? pageT('next_page') : '下一页')}</button>
  `;
}
function render(){
  const activeCategories=getFactoryCategories(currentFactory);
  const keys=getVisibleCategoryKeys(activeCategories);
  if(!activeCategories[currentCategory]) currentCategory=getDefaultCategory(currentFactory);
  const current=activeCategories[currentCategory] || {items:[]};
  mainFilter.innerHTML=factories.map(factory=>{
    const label=window.translatePageText ? translatePageText(factory.label) : factory.label;
    return `<button class="filter-btn${factory.key===currentFactory?' active':''}" type="button" data-factory="${factory.key}">${escapeHtml(label)}</button>`;
  }).join('');
  if(!keys.length && !searchQuery.trim()){
    subFilter.innerHTML='';
    productGrid.innerHTML=`<div class="empty-state">${escapeHtml(window.pageT ? pageT('empty_factory') : '该工厂暂无产品图片')}</div>`;
    productPager.innerHTML='';
    return;
  }
  subFilter.innerHTML=keys.length ? keys.map(key=>{
    const label=window.translatePageText ? translatePageText(activeCategories[key].label) : activeCategories[key].label;
    return `<button class="filter-btn${key===currentCategory?' active':''}" type="button" data-category="${key}">${escapeHtml(label)}</button>`;
  }).join('') : '';
  const filteredItems=getFilteredItems(current.items);
  const totalPages=Math.ceil(filteredItems.length/itemsPerPage);
  currentPage=Math.min(Math.max(1,currentPage),Math.max(1,totalPages));
  const pageItems=filteredItems.slice((currentPage-1)*itemsPerPage,currentPage*itemsPerPage);
  const emptyText=searchQuery.trim()
    ? (window.pageT ? pageT('no_results',{query:searchQuery.trim()}) : `没有找到“${searchQuery.trim()}”`)
    : (window.pageT ? pageT('empty_category') : '该栏目暂无产品图片');
  productGrid.innerHTML=filteredItems.length
    ? pageItems.map(item=>{
      const title=escapeHtml(displayTitle(item.model || item.title));
      const img=escapeHtml(imageSrc(item.img));
      return `<article class="card"><img src="${img}" alt="${title}" loading="lazy" decoding="async"><h2>${title}</h2></article>`;
    }).join('')
    : `<div class="empty-state">${escapeHtml(emptyText)}</div>`;
  renderPager(filteredItems.length);
  syncSearchState();
}
pageSearch.addEventListener('submit', event=>{
  event.preventDefault();
  productSearch.focus();
});
searchToggle.addEventListener('click', ()=>{
  pageSearch.classList.add('is-open');
  productSearch.focus();
});
productSearch.addEventListener('input', ()=>{
  searchQuery=productSearch.value;
  currentPage=1;
  render();
});
productSearch.addEventListener('focus', syncSearchState);
productSearch.addEventListener('blur', ()=>{
  window.setTimeout(syncSearchState,120);
});
searchClear.addEventListener('click', ()=>{
  productSearch.value='';
  searchQuery='';
  currentPage=1;
  render();
  productSearch.focus();
});
productGrid.addEventListener('click', event=>{
  const img=event.target.closest('.card img');
  if(!img) return;
  openImageViewer(img);
});
imageViewer.addEventListener('click', event=>{
  const action=event.target.closest('[data-viewer-action]');
  if(action){
    const type=action.dataset.viewerAction;
    if(type==='zoom-in') setViewerScale(viewerScale*1.25);
    if(type==='zoom-out') setViewerScale(viewerScale/1.25);
    if(type==='reset') setViewerScale(1);
    return;
  }
  if(suppressViewerClick){
    suppressViewerClick=false;
    return;
  }
  closeImageViewer();
});
imageViewerSurface.addEventListener('wheel', event=>{
  if(!imageViewer.classList.contains('is-open')) return;
  event.preventDefault();
  setViewerScale(viewerScale*(event.deltaY<0?1.12:.88));
},{passive:false});
imageViewerSurface.addEventListener('pointerdown', event=>{
  if(!imageViewer.classList.contains('is-open')) return;
  viewerPointers.set(event.pointerId,{x:event.clientX,y:event.clientY});
  imageViewerSurface.setPointerCapture(event.pointerId);
  viewerMoved=false;
  imageViewerImage.classList.add('is-dragging');
  if(viewerPointers.size===1){
    viewerDrag={x:event.clientX,y:event.clientY,startX:viewerX,startY:viewerY};
    viewerPinch=null;
  }
  if(viewerPointers.size===2){
    const points=[...viewerPointers.values()];
    viewerPinch={distance:getPointerDistance(points),scale:viewerScale};
    viewerDrag=null;
  }
});
imageViewerSurface.addEventListener('pointermove', event=>{
  if(!viewerPointers.has(event.pointerId)) return;
  viewerPointers.set(event.pointerId,{x:event.clientX,y:event.clientY});
  if(viewerPointers.size===2 && viewerPinch){
    const points=[...viewerPointers.values()];
    const distance=getPointerDistance(points);
    if(Math.abs(distance-viewerPinch.distance)>3) viewerMoved=true;
    setViewerScale(viewerPinch.scale*(distance/viewerPinch.distance));
    return;
  }
  if(viewerPointers.size===1 && viewerDrag && viewerScale>1){
    const dx=event.clientX-viewerDrag.x;
    const dy=event.clientY-viewerDrag.y;
    if(Math.hypot(dx,dy)>4) viewerMoved=true;
    viewerX=viewerDrag.startX+dx;
    viewerY=viewerDrag.startY+dy;
    applyViewerTransform();
  }
});
function endViewerPointer(event){
  if(viewerMoved){
    suppressViewerClick=true;
    window.setTimeout(()=>{suppressViewerClick=false;},220);
  }
  viewerPointers.delete(event.pointerId);
  imageViewerImage.classList.remove('is-dragging');
  if(viewerPointers.size===1) restartSinglePointerDrag();
  if(!viewerPointers.size) viewerPinch=null;
}
imageViewerSurface.addEventListener('pointerup',endViewerPointer);
imageViewerSurface.addEventListener('pointercancel',endViewerPointer);
document.addEventListener('keydown', event=>{
  if(!imageViewer.classList.contains('is-open')) return;
  if(event.key==='Escape') closeImageViewer();
  if(event.key==='+' || event.key==='=') setViewerScale(viewerScale*1.25);
  if(event.key==='-') setViewerScale(viewerScale/1.25);
});
mainFilter.addEventListener('click', event=>{
  const button=event.target.closest('[data-factory]');
  if(!button) return;
  selectFactory(button.dataset.factory);
});
subFilter.addEventListener('click', event=>{
  const button=event.target.closest('[data-category]');
  if(!button) return;
  selectCategory(button.dataset.category);
});
productPager.addEventListener('click', event=>{
  const button=event.target.closest('[data-page]');
  if(!button || button.disabled) return;
  selectPage(Number(button.dataset.page));
});
if(window.initPageI18n) initPageI18n(()=>render());
render();
</script>
</body>
